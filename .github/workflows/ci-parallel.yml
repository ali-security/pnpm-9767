name: CI (parallel)

# Like CI, but instead of running every package's test suite serially on one
# runner, this fans out: one GitHub runner per workspace package. A `discover`
# job builds the matrix (all packages that have a `_test` script) and the
# `test` job runs each package's suite on its own runner, in parallel.
#
# Trigger manually from the Actions tab (workflow_dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      node-version:
        description: "Node.js version to test on"
        required: false
        default: "22.12.0"

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.list.outputs.packages }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build package matrix (packages with a _test script)
        id: list
        run: |
          set -euo pipefail
          packages=$(git ls-files | grep -E '(^|/)package\.json$' | node -e '
            const fs = require("fs")
            let s = ""
            process.stdin.on("data", d => s += d).on("end", () => {
              const files = s.split("\n").filter(Boolean)
              const names = new Set()
              for (const f of files) {
                if (f.includes("node_modules")) continue
                try {
                  const pj = JSON.parse(fs.readFileSync(f, "utf8"))
                  if (pj.name && pj.scripts && pj.scripts._test) names.add(pj.name)
                } catch {}
              }
              process.stdout.write(JSON.stringify([...names].sort()))
            })
          ')
          count=$(node -e "process.stdout.write(String(JSON.parse(process.argv[1]).length))" "$packages")
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Discovered $count packages with a _test script"

  test:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # GitHub caps a matrix at 256 jobs; there are well under that.
      matrix:
        package: ${{ fromJson(needs.discover.outputs.packages) }}
    name: ${{ matrix.package }}
    steps:
      - name: Configure Git
        run: |
          git config --global core.autocrlf false
          git config --global user.name "xyz"
          git config --global user.email "x@y.z"
      - name: Checkout Commit
        uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          standalone: true
      - name: Setup Node
        run: pnpm env use -g ${{ github.event.inputs.node-version || '22.12.0' }}
        timeout-minutes: 2
      - name: Install npm@8
        run: pnpm add --global npm@8
        timeout-minutes: 2
      - name: pnpm install
        run: pnpm install
        timeout-minutes: 10
      - name: Compile + prepare fixtures
        # Mirrors `pretest`: builds every package's lib/ (the package under test
        # imports its workspace deps' compiled output) and prepares fixtures.
        run: pnpm run pretest
        timeout-minutes: 30
      - name: Run ${{ matrix.package }} test suite
        run: pnpm --filter=${{ matrix.package }} run _test
        timeout-minutes: 30
        env:
          PNPM_WORKERS: 3
